<html>
<title>Gatekeeper Leveling - Meraki</title>

<body>
	<center>
		<img src="L2UI_CH3.onscrmsg_pattern01_1" width=300 height=32>
		<br>
		<table width=270>
			<tr>
				<td align=center>
					<font color="LEVEL">Zonas de Leveling (Por Rango)</font>
				</td>
			</tr>
		</table>
		<br>
		<table width=240>
			<tr>
				<td><button action="bypass -h npc_%objectId%_goto 201" value="Level 20-40" width=100 height=21 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normalOn"></td>
				<td><button action="bypass -h npc_%objectId%_goto 202" value="Level 40-55" width=100 height=21 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normalOn"></td>
			</tr>
			<tr>
				<td><button action="bypass -h npc_%objectId%_goto 203" value="Level 55-70" width=100 height=21 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normalOn"></td>
				<td><button action="bypass -h npc_%objectId%_goto 204" value="Level 70-80" width=100 height=21 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normalOn"></td>
			</tr>
		</table>
		<br>
		<table width=270>
			<tr>
				<td align=center>
					<font color="LEVEL">Catacumbas y Necropolis</font>
				</td>
			</tr>
		</table>
		<table width=240>
			<tr>
				<td><button action="bypass -h npc_%objectId%_goto 301" value="Necropolis" width=100 height=21 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normalOn"></td>
				<td><button action="bypass -h npc_%objectId%_goto 302" value="Catacombs" width=100 height=21 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normalOn"></td>
			</tr>
			<tr>
				<td align=center colspan=2><button action="bypass -h npc_%objectId%_Chat 0" value="Back" width=100 height=21 back="L2UI_ch3.Btn1_normalOn" fore="L2UI_ch3.Btn1_normalOn"></td>
			</tr>
		</table>
		<br>
		<img src="L2UI_CH3.onscrmsg_pattern01_1" width=300 height=32>
	</center>
</body>

</html>
